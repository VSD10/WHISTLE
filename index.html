<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>WHISTLE // DECONSTRUCTED_DATA_STREAM</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo+Black&amp;family=Chivo+Mono:wght@100..900&amp;family=Syne:wght@800&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "neon-green": "#39ff14",
                        "neon-magenta": "#ff00ff",
                        "deep-black": "#020202",
                        "data-gray": "#0a0a0a",
                        primary: "#39E079"
                    },
                    fontFamily: {
                        header: ["Syne", "sans-serif"],
                        condensed: ["Archivo Black", "sans-serif"],
                        mono: ["Chivo Mono", "monospace"]
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-deep-black text-white font-mono selection:bg-neon-magenta selection:text-white overflow-x-hidden;
            }
            /* Hide Scrollbar */
            ::-webkit-scrollbar {
                display: none;
            }
            html {
                -ms-overflow-style: none;  /* IE and Edge */
                scrollbar-width: none;  /* Firefox */
            }
        }
        @layer components {
            .glitch-bar {
                @apply bg-neon-green text-black py-1 px-4 text-[9px] font-bold tracking-[0.2em] relative overflow-hidden shrink-0;
            }
            .scanlines {
                background: linear-gradient(
                    to bottom,
                    rgba(57, 255, 20, 0.03) 50%,
                    rgba(0, 0, 0, 0.15) 50%
                );
                background-size: 100% 2px;
                pointer-events: none;
            }
            .data-block {
                @apply border border-white/5 bg-data-gray/60 backdrop-blur-sm p-6 mb-4 relative w-full max-w-none;
            }
            .agent-label {
                @apply absolute -top-2.5 left-4 px-3 bg-deep-black text-[10px] font-bold tracking-[0.2em] border border-white/10;
            }
            .consensus-bar {
                @apply h-1 bg-white/5 relative overflow-hidden border border-white/10 w-24;
            }
            .consensus-fill {
                @apply absolute top-0 left-0 h-full bg-neon-green shadow-[0_0_10px_#39ff14];
                width: 89.4%;
            }
            .terminal-input {
                @apply w-full bg-transparent border-none focus:ring-0 text-neon-green font-mono placeholder:text-white/10 text-sm tracking-widest;
            }
            .glitch-button {
                @apply relative bg-neon-green text-black px-8 py-3 text-xs font-black tracking-[0.3em] overflow-hidden border-2 border-neon-green hover:bg-black hover:text-neon-green transition-all;
            }
            .circuit-gear {
                background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBVDsohF7NSINtAnRk5DHJn0Yfh8p1ljqs6UwRzt2T00WikOuKXHR29VNqHxNCInyqRxpYyNgedbKQeDO_-MHHaNLFqNaZ-h-7KaNJx4NAw5JsydtTFu6ovRJaxlwvj-MuzHRzfuGr4MPyyKRP2mOHlHthHL9vyLCZq8KlyafsqvFUsoz_lPmXTmSoVPb1BrKAtbLNg1pXde9hVC88uybMXjlGxBu76OVG64aRFpE0AQawmT2znobalasyga3cTnfFlGzEVBOIlzRk');
                background-size: cover;
                background-position: center;
                filter: grayscale(1) invert(1) brightness(1.5);
            }
            .status-indicator {
                @apply flex items-center gap-2 px-3 py-1 border border-white/10 bg-black/40 text-[9px] font-bold tracking-widest text-white/50 hover:border-neon-green hover:text-white transition-all cursor-pointer;
            }
            .nav-overlay {
                @apply absolute top-full left-0 right-0 bg-deep-black/95 border-b border-neon-green/30 p-8 z-[150] backdrop-blur-xl hidden group-hover:block;
            }
            .data-packet {
                @apply border border-neon-green/20 bg-data-gray/60 backdrop-blur-md p-6 relative transition-all duration-300;
            }
            .data-packet:hover {
                @apply border-neon-green/60 bg-data-gray/80 translate-y-[-4px];
            }
            .obstructed-text {
                @apply text-[18vw] leading-[0.7] tracking-tighter font-header opacity-5 absolute pointer-events-none uppercase select-none;
            }
            .nav-link {
                @apply text-[10px] tracking-widest hover:text-neon-green transition-colors uppercase font-bold;
            }
            .neon-btn {
                @apply bg-transparent border border-neon-green text-neon-green px-6 py-2 text-xs font-condensed hover:bg-neon-green hover:text-black transition-all shadow-[0_0_15px_rgba(57,255,20,0.3)];
            }
            .magenta-highlight {
                @apply text-neon-magenta font-bold;
            }
            .circuit-bg {
                background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBVDsohF7NSINtAnRk5DHJn0Yfh8p1ljqs6UwRzt2T00WikOuKXHR29VNqHxNCInyqRxpYyNgedbKQeDO_-MHHaNLFqNaZ-h-7KaNJx4NAw5JsydtTFu6ovRJaxlwvj-MuzHRzfuGr4MPyyKRP2mOHlHthHL9vyLCZq8KlyafsqvFUsoz_lPmXTmSoVPb1BrKAtbLNg1pXde9hVC88uybMXjlGxBu76OVG64aRFpE0AQawmT2znobalasyga3cTnfFlGzEVBOIlzRk');
                background-size: cover;
                background-position: center;
                filter: contrast(150%) brightness(20%) grayscale(100%);
            }
            .modal-enter {
                animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            .terminal-block {
                @apply border border-white/10 bg-black/40 p-4 font-mono text-[11px] relative overflow-hidden;
            }
            .terminal-header {
                @apply flex items-center gap-2 border-b border-white/10 pb-2 mb-4;
            }
            .status-dot {
                @apply w-1.5 h-1.5 rounded-full bg-neon-green;
            }
        }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 2px); }
            2% { transform: translate(2px, -2px); }
            3% { transform: translate(0); }
            100% { transform: translate(0); }
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @keyframes glitchReveal {
            0% { opacity: 0; transform: translateX(-20px) skew(20deg); filter: blur(5px); }
            20% { opacity: 1; transform: translateX(0) skew(-10deg); }
            40% { transform: skew(5deg); }
            60% { transform: skew(-2deg); }
            80% { transform: skew(1deg); }
            100% { opacity: 1; transform: skew(0); }
        }
        .animate-slide-up {
            animation: slideUpFade 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        .animate-glitch-reveal {
            animation: glitchReveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-500 { animation-delay: 500ms; }
        .delay-700 { animation-delay: 700ms; }
    </style>
